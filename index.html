<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pocket Studio — Review Tab Redesign</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#09090b;color:#e4e4e7;min-height:100vh;-webkit-font-smoothing:antialiased}
.cv5-wrap{max-width:1200px;margin:0 auto;padding:56px 40px 80px}
.cv5-h2{font-size:32px;font-weight:700;color:#fafafa;letter-spacing:-.02em;margin-bottom:8px}
.cv5-sub{font-size:14px;color:#71717a;margin-bottom:40px}
.cv5-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start}
.cv5-lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;color:#52525b}
.cv5-lbl.prp{color:#ffffff}
.cv5-phone{border-radius:24px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.cv5-phone.cur5{background:#111113;border:1px solid #27272a;border-radius:20px;padding:20px 16px 28px;height:auto;overflow:visible}
.c6-header{margin-bottom:18px}
.c6-intro{font-size:12px;color:#71717a;margin-bottom:8px}
.c6-stats{display:flex;gap:10px;font-size:11px;font-weight:700;color:#a1a1aa;letter-spacing:.06em}
.c6-sep{color:#3f3f46}
.c6-sec-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.c6-sec-name{font-size:12px;font-weight:700;color:#71717a;letter-spacing:.06em;text-transform:uppercase}
.c6-str-card,.c6-tip-card,.c6-rw-card{border-radius:12px;padding:0;margin-bottom:8px;cursor:pointer}
.c6-str-card{background:rgba(22,40,12,.7);border:1px solid rgba(60,90,30,.4)}
.c6-tip-card,.c6-rw-card{background:#18181b;border:1px solid #27272a}
.c6-card-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px}
.c6-str-title{font-size:13px;font-weight:600;color:#d4edaa}
.c6-card-title{font-size:13px;font-weight:600;color:#e4e4e7}
.c6-chev{color:rgba(255,255,255,.25);font-size:14px;flex-shrink:0;transition:transform .2s}
.c6-str-card .c6-str-why,.c6-tip-card .c6-body,.c6-rw-card .c6-body{display:none;padding:0 14px 12px}
.c6-str-card.open .c6-str-why,.c6-tip-card.open .c6-body,.c6-rw-card.open .c6-body{display:block}
.c6-str-card.open .c6-chev,.c6-tip-card.open .c6-chev,.c6-rw-card.open .c6-chev{transform:rotate(180deg)}
.c6-str-why{font-size:12px;color:rgba(180,220,140,.7);line-height:1.55}
.c6-label{font-size:10px;font-weight:700;letter-spacing:.09em;color:#52525b;text-transform:uppercase;margin-bottom:4px;margin-top:10px}
